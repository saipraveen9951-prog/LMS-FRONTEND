<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Reports - SkillForge LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Admin Reports</h1>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div id="reportMessage"></div>

    <div class="row gy-4">
        <div class="col-lg-4">
            <section class="panel p-4">
                <h2 class="panel-title">Employee Learning Report</h2>
                <form id="employeeReportForm" class="row g-3">
                    <div class="col-12">
                        <label class="form-label" for="employeeId">Employee ID</label>
                        <input class="form-control" id="employeeId" type="number" required>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary w-100" type="submit">Fetch Employee Report</button>
                    </div>
                </form>
            </section>
        </div>
        <div class="col-lg-4">
            <section class="panel p-4">
                <h2 class="panel-title">Department Report</h2>
                <button class="btn btn-primary w-100" onclick="loadDepartmentReport()">Load Department Analytics</button>
            </section>
        </div>
        <div class="col-lg-4">
            <section class="panel p-4">
                <h2 class="panel-title">Course Completion</h2>
                <button class="btn btn-primary w-100" onclick="loadCourseCompletionReport()">Load Course Completion</button>
            </section>
        </div>
    </div>

    <section class="panel mt-4 p-4">
        <h2 class="panel-title">Report Results</h2>
        <div id="reportResults" class="mt-3"></div>
    </section>
</div>

<script src="js/app.js"></script>
<script>
    async function loadEmployeeReport(employeeId) {
        try {
            if (!ensureRole('ADMIN')) return;
            const result = await api.get(`/api/admin/reports/employee/${employeeId}`);
            renderReport(result, 'Employee Learning Report');
        } catch (error) {
            showMessage('reportMessage', error.message, 'danger');
        }
    }

    async function loadDepartmentReport() {
        try {
            if (!ensureRole('ADMIN')) return;
            const result = await api.get('/api/admin/reports/departments');
            renderReport(result, 'Department Learning Report');
        } catch (error) {
            showMessage('reportMessage', error.message, 'danger');
        }
    }

    async function loadCourseCompletionReport() {
        try {
            if (!ensureRole('ADMIN')) return;
            const result = await api.get('/api/admin/reports/courses/completion');
            renderReport(result, 'Course Completion Analytics');
        } catch (error) {
            showMessage('reportMessage', error.message, 'danger');
        }
    }

    function renderReport(items, title) {
        const container = document.getElementById('reportResults');
        container.innerHTML = `<h3>${title}</h3>` + (
            items.length ? `<pre>${escapeHtml(JSON.stringify(items, null, 2))}</pre>` : '<div class="text-muted">No data returned.</div>'
        );
    }

    document.getElementById('employeeReportForm').addEventListener('submit', event => {
        event.preventDefault();
        const employeeId = Number(document.getElementById('employeeId').value);
        loadEmployeeReport(employeeId);
    });
</script>
</body>
</html>
