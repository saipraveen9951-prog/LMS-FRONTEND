<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - SkillForge LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Notifications</h1>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div id="notificationMessage"></div>

    <section class="panel p-4">
        <h2 class="panel-title">Send Email Notification</h2>
        <form id="notificationForm" class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="recipientEmail">Recipient Email</label>
                <input type="email" class="form-control" id="recipientEmail" required>
            </div>
            <div class="col-md-6">
                <label class="form-label" for="notificationType">Type</label>
                <select id="notificationType" class="form-select">
                    <option value="REMINDER">REMINDER</option>
                    <option value="COURSE_ASSIGNMENT">COURSE_ASSIGNMENT</option>
                    <option value="CERTIFICATE">CERTIFICATE</option>
                </select>
            </div>
            <div class="col-12">
                <label class="form-label" for="notificationSubject">Subject</label>
                <input type="text" class="form-control" id="notificationSubject" required>
            </div>
            <div class="col-12">
                <label class="form-label" for="notificationBody">Message</label>
                <textarea class="form-control" id="notificationBody" rows="4" required></textarea>
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">Send Notification</button>
            </div>
        </form>
    </section>
</div>
<script src="js/app.js"></script>
<script>
    document.getElementById('notificationForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
            if (!ensureRole('ADMIN')) return;
            const payload = {
                recipientEmail: document.getElementById('recipientEmail').value,
                type: document.getElementById('notificationType').value,
                subject: document.getElementById('notificationSubject').value,
                body: document.getElementById('notificationBody').value
            };
            const result = await api.post('/api/admin/notifications/send', payload);
            showMessage('notificationMessage', `Notification sent to ${escapeHtml(result.recipientEmail)}.`, 'success');
        } catch (error) {
            showMessage('notificationMessage', error.message, 'danger');
        }
    });
</script>
</body>
</html>
