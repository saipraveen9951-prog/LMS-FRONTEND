<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - SkillForge LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-secondary">
    <div class="container-fluid">
        <a class="navbar-brand" href="admin-dashboard.html">Departments</a>
        <div>
            <button class="btn btn-outline-light me-2" onclick="window.location.href='admin-dashboard.html'">Dashboard</button>
            <button class="btn btn-outline-light" onclick="logout()">Logout</button>
        </div>
    </div>
</nav>
<div class="container py-4">
    <h3>Departments</h3>
    <div id="departmentMessage"></div>
    <div class="card p-3 mb-4">
        <h4 class="h5">Create or update department</h4>
        <form id="departmentForm" class="row g-3">
            <input type="hidden" id="departmentId" name="id">
            <div class="col-md-4">
                <label class="form-label" for="name">Name</label>
                <input class="form-control" id="name" name="name" required>
            </div>
            <div class="col-md-5">
                <label class="form-label" for="description">Description</label>
                <input class="form-control" id="description" name="description">
            </div>
            <div class="col-md-3 d-flex align-items-end gap-2">
                <button class="btn btn-primary" type="submit">Save</button>
                <button class="btn btn-outline-secondary" type="button" onclick="resetDepartmentForm()">Clear</button>
            </div>
        </form>
    </div>
    <div id="departmentList" class="list-group"></div>
</div>
<script src="js/app.js"></script>
<script>
    let departments = [];

    async function loadDepartments() {
        const list = document.getElementById('departmentList');
        if (!ensureRole('ADMIN')) {
            list.innerHTML = `
                <div class="alert alert-warning">
                    Departments can be managed only by an admin account. Please logout and login as ADMIN.
                </div>
            `;
            return;
        }
        try {
            departments = await api.get('/api/admin/departments');
            if (!departments.length) {
                list.innerHTML = '<div class="alert alert-info">No departments are available yet.</div>';
                return;
            }
            list.innerHTML = departments.map(dept => `
                <div class="list-group-item d-flex justify-content-between align-items-start gap-3">
                    <div>
                        <h5>${escapeHtml(dept.name)}</h5>
                        <p class="mb-0">${escapeHtml(dept.description || 'No description available.')}</p>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-sm btn-outline-primary" onclick="editDepartment(${dept.id})">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteDepartment(${dept.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        } catch (error) {
            list.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
        }
    }

    function editDepartment(id) {
        const dept = departments.find(item => item.id === id);
        if (!dept) return;
        document.getElementById('departmentId').value = dept.id;
        document.getElementById('name').value = dept.name || '';
        document.getElementById('description').value = dept.description || '';
    }

    function resetDepartmentForm() {
        document.getElementById('departmentForm').reset();
        document.getElementById('departmentId').value = '';
    }

    async function deleteDepartment(id) {
        if (!confirm('Delete this department?')) return;
        try {
            await api.delete(`/api/admin/departments/${id}`);
            showMessage('departmentMessage', 'Department deleted.', 'success');
            await loadDepartments();
        } catch (error) {
            showMessage('departmentMessage', error.message, 'danger');
        }
    }

    document.getElementById('departmentForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const data = formData(event.currentTarget);
        const body = { name: data.name, description: data.description };
        try {
            if (data.id) {
                await api.put(`/api/admin/departments/${data.id}`, body);
                showMessage('departmentMessage', 'Department updated.', 'success');
            } else {
                await api.post('/api/admin/departments', body);
                showMessage('departmentMessage', 'Department created.', 'success');
            }
            resetDepartmentForm();
            await loadDepartments();
        } catch (error) {
            showMessage('departmentMessage', error.message, 'danger');
        }
    });

    loadDepartments();
</script>
</body>
</html>
