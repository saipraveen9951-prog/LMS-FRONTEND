<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Learning Asset - SkillForge LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Upload Learning Asset</h1>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div id="uploadMessage"></div>

    <section class="panel p-4">
        <h2 class="panel-title">Upload Video or Document</h2>
        <form id="uploadForm" class="row g-3" enctype="multipart/form-data">
            <div class="col-md-4">
                <label class="form-label" for="moduleId">Module ID</label>
                <input type="number" class="form-control" id="moduleId" required>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="fileType">File Type</label>
                <select id="fileType" class="form-select">
                    <option value="VIDEO">VIDEO</option>
                    <option value="DOCUMENT">DOCUMENT</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label" for="fileInput">Select File</label>
                <input class="form-control" type="file" id="fileInput" required>
            </div>
            <div class="col-12">
                <button class="btn btn-primary" type="submit">Upload</button>
            </div>
        </form>
    </section>
</div>
<script src="js/app.js"></script>
<script>
    document.getElementById('uploadForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        try {
            if (!ensureRole('TRAINER') && !ensureRole('ADMIN')) return;
            const formData = new FormData();
            formData.append('moduleId', document.getElementById('moduleId').value);
            formData.append('type', document.getElementById('fileType').value);
            formData.append('file', document.getElementById('fileInput').files[0]);

            const response = await upload('/api/trainer/modules/upload', formData);
            const fileName = response.fileName || response.filename || 'file';
            showMessage('uploadMessage', `Uploaded ${escapeHtml(fileName)} as ${escapeHtml(response.type)}.`, 'success');
        } catch (error) {
            showMessage('uploadMessage', error.message, 'danger');
        }
    });
</script>
</body>
</html>
