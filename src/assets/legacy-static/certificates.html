<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificates - SkillForge LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Certificates</h1>
        <button class="btn btn-secondary" onclick="logout()">Logout</button>
    </div>

    <div id="certificateMessage"></div>

    <section class="panel p-4">
        <h2 class="panel-title">Generate Certificate</h2>
        <form id="certificateForm" class="row g-3">
            <div class="col-md-6">
                <label class="form-label" for="enrollmentId">Enrollment ID</label>
                <input type="number" class="form-control" id="enrollmentId" required>
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <button class="btn btn-primary w-100" type="submit">Generate</button>
            </div>
        </form>
        <div id="certificateResult" class="mt-4"></div>
    </section>
</div>
<script src="js/app.js"></script>
<script>
    document.getElementById('certificateForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const enrollmentId = Number(document.getElementById('enrollmentId').value);
        try {
            if (!ensureRole('EMPLOYEE')) return;
            const result = await api.post(`/api/employee/certificates/generate/${enrollmentId}`, {});
            const certificateId = result.id || result.certificateId;
            const downloadUrl = result.downloadUrl || `/api/employee/certificates/${certificateId}/download`;
            const fileName = result.fileName || result.filename || 'certificate.pdf';
            const link = `<a href="${downloadUrl}" class="btn btn-success mt-3">Download ${escapeHtml(fileName)}</a>`;
            document.getElementById('certificateResult').innerHTML = `<div class="alert alert-success">Certificate generated successfully.</div>${link}`;
        } catch (error) {
            showMessage('certificateMessage', error.message, 'danger');
        }
    });
</script>
</body>
</html>
