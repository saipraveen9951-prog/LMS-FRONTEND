<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SkillForge LMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h3 class="card-title mb-4">Register an account</h3>
                    <form id="registerForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="firstName" class="form-label">First name</label>
                                <input type="text" class="form-control" id="firstName" required>
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label">Last name</label>
                                <input type="text" class="form-control" id="lastName" required>
                            </div>
                        </div>
                        <div class="mb-3 mt-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="role" class="form-label">Role</label>
                            <select class="form-select" id="role" required>
                                <option value="EMPLOYEE">Employee</option>
                                <option value="TRAINER">Trainer</option>
                                <option value="ADMIN">Admin</option>
                            </select>
                        </div>
                        <div class="mb-3 d-none" id="departmentGroup">
                            <label for="departmentId" class="form-label">Department</label>
                            <select class="form-select" id="departmentId">
                                <option value="">Unassigned</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Register</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="login.html">Already have an account?</a>
                    </div>
                </div>
            </div>
            <div id="registerMessage" class="mt-3"></div>
        </div>
    </div>
</div>
<script src="js/app.js"></script>
<script>
    async function loadAdminDepartments() {
        if (getCurrentRole() !== 'ADMIN') return;
        try {
            const departments = await api.get('/api/admin/departments');
            document.getElementById('departmentGroup').classList.remove('d-none');
            document.getElementById('departmentId').innerHTML = '<option value="">Unassigned</option>' + departments.map(dept =>
                `<option value="${dept.id}">${escapeHtml(dept.name)}</option>`
            ).join('');
        } catch (error) {
            showMessage('registerMessage', error.message, 'warning');
        }
    }

    document.getElementById('registerForm').addEventListener('submit', async function (event) {
        event.preventDefault();
        const body = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            role: document.getElementById('role').value,
            departmentId: optionalNumber(document.getElementById('departmentId').value)
        };
        try {
            await register(body);
            if (getCurrentRole() === 'ADMIN') {
                showMessage('registerMessage', 'User created. Returning to users...', 'success');
                setTimeout(() => window.location.href = 'users.html', 900);
            } else {
                showMessage('registerMessage', 'Registration successful. Redirecting to login...', 'success');
                setTimeout(() => window.location.href = 'login.html', 1200);
            }
        } catch (error) {
            showMessage('registerMessage', error.message, 'danger');
        }
    });

    loadAdminDepartments();
</script>
</body>
</html>
