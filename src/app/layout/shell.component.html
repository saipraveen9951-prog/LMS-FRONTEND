<div class="container-fluid app-layout">
  <div class="row">
    <aside class="col-lg-2 sidebar p-3">
      <h1 class="h5 text-white mb-3">SkillForge LMS</h1>
      <div class="text-secondary small mb-3">{{ role }}</div>
      <nav class="d-grid gap-1">
        <a *ngIf="role === 'ADMIN'" routerLink="/admin" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
        <a *ngIf="role === 'ADMIN'" routerLink="/admin/users" routerLinkActive="active">Users</a>
        <a *ngIf="role === 'ADMIN'" routerLink="/admin/departments" routerLinkActive="active">Departments</a>
        <a *ngIf="role === 'ADMIN'" routerLink="/admin/reports" routerLinkActive="active">Reports</a>
        <a *ngIf="role === 'ADMIN'" routerLink="/admin/notifications" routerLinkActive="active">Notifications</a>
        <a routerLink="/courses" routerLinkActive="active">Courses</a>
        <a *ngIf="role === 'TRAINER'" routerLink="/trainer/upload" routerLinkActive="active">Upload Materials</a>
        <a *ngIf="role === 'TRAINER' || role === 'ADMIN'" routerLink="/trainer/assessments" routerLinkActive="active">Manage Assessments</a>
        <a *ngIf="role === 'EMPLOYEE'" routerLink="/employee" routerLinkActive="active">My Learning</a>
        <a *ngIf="role === 'EMPLOYEE'" routerLink="/assessments" routerLinkActive="active">Assessments</a>
        <a *ngIf="role === 'EMPLOYEE'" routerLink="/certificates" routerLinkActive="active">Certificates</a>
      </nav>
    </aside>
    <main class="col-lg-10 p-0">
      <header class="bg-white border-bottom p-3 d-flex justify-content-between align-items-center">
        <span class="fw-semibold">Employee Learning Management System</span>
        <button class="btn btn-sm btn-outline-secondary" type="button" (click)="logout()">Logout</button>
      </header>
      <section class="p-3 p-lg-4">
        <router-outlet></router-outlet>
      </section>
    </main>
  </div>
</div>
