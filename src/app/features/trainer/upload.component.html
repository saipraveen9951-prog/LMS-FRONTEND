<h2 class="page-title">Upload Materials</h2>
<p class="text-muted">Backend endpoint: <code>POST /api/trainer/modules/upload</code></p>
<div class="alert alert-danger" *ngIf="error">{{ error }}</div>
<div class="alert alert-success" *ngIf="message">{{ message }}</div>

<form class="content-card" [formGroup]="form" (ngSubmit)="upload()">
  <div class="mb-3">
    <label class="form-label" for="courseId">Course</label>
    <select id="courseId" class="form-select" formControlName="courseId" (change)="loadModules()">
      <option [ngValue]="null">Select course</option>
      <option *ngFor="let course of courses" [ngValue]="course.id">{{ course.title }}</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label" for="moduleId">Module</label>
    <select id="moduleId" class="form-select" formControlName="moduleId" [disabled]="!modules.length">
      <option [ngValue]="null">Select module</option>
      <option *ngFor="let module of modules" [ngValue]="module.id">{{ module.title }}</option>
    </select>
    <div class="text-danger small mt-1" *ngIf="form.controls.courseId.value && !modules.length">No modules found for this course.</div>
  </div>

  <div class="mb-3">
    <label class="form-label" for="fileType">File type</label>
    <select id="fileType" class="form-select" formControlName="fileType">
      <option *ngFor="let fileType of fileTypes" [value]="fileType">{{ fileType }}</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label" for="materialFile">Material file</label>
    <input id="materialFile" class="form-control" type="file" (change)="chooseFile($event)">
  </div>

  <button class="btn btn-primary" type="submit">Upload</button>
</form>
