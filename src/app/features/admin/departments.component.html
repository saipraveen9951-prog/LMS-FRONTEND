<h2 class="page-title">Departments</h2>
<div class="alert alert-danger" *ngIf="error">{{ error }}</div>
<div class="alert alert-success" *ngIf="message">{{ message }}</div>
<div class="row g-3">
  <div class="col-lg-5">
    <form class="content-card" [formGroup]="form" (ngSubmit)="save()">
      <h3 class="h5">{{ selected ? 'Edit' : 'Create' }} Department</h3>
      <input class="form-control mb-2" formControlName="name" placeholder="Department name">
      <textarea class="form-control mb-3" rows="3" formControlName="description" placeholder="Description"></textarea>
      <button class="btn btn-primary me-2" type="submit">Save</button>
      <button class="btn btn-outline-secondary" type="button" (click)="reset()">Clear</button>
    </form>
  </div>
  <div class="col-lg-7">
    <div class="content-card">
      <h3 class="h5">Department List</h3>
      <div class="list-group">
        <div class="list-group-item d-flex justify-content-between align-items-start" *ngFor="let department of departments">
          <div><strong>{{ department.name }}</strong><div class="text-muted small">{{ department.description }}</div></div>
          <div><button class="btn btn-sm btn-outline-primary me-1" (click)="edit(department)">Edit</button><button class="btn btn-sm btn-outline-danger" (click)="delete(department)">Delete</button></div>
        </div>
        <div class="text-muted" *ngIf="!departments.length">No departments found.</div>
      </div>
    </div>
  </div>
</div>
