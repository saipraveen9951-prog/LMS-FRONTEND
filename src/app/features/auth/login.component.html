<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
      <div class="content-card">
        <h1 class="page-title mb-1">SkillForge LMS</h1>
        <p class="text-muted mb-4">Login with your company account.</p>

        <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

        <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input id="email" class="form-control" type="email" formControlName="email">
            <div class="text-danger small" *ngIf="form.controls.email.touched && form.controls.email.invalid">Valid email is required.</div>
          </div>

          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input id="password" class="form-control" type="password" formControlName="password">
            <div class="text-danger small" *ngIf="form.controls.password.touched && form.controls.password.invalid">Password is required.</div>
          </div>

          <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
            <span class="spinner-border spinner-border-sm me-2" *ngIf="loading"></span>
            Login
          </button>
        </form>

        <div class="text-center mt-3">
          <span class="text-muted">No account?</span>
          <a routerLink="/register" class="ms-1">Register</a>
        </div>
      </div>
    </div>
  </div>
</main>
