<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
  <div>
    <h2 class="page-title mb-0">My Notifications</h2>
    <div class="text-muted small">{{ summary.unread }} unread of {{ summary.total }}</div>
  </div>
  <div class="d-flex gap-2">
    <div class="btn-group btn-group-sm">
      <button class="btn" type="button" [class.btn-primary]="!unreadOnly" [class.btn-outline-primary]="unreadOnly" (click)="load(false)">All</button>
      <button class="btn" type="button" [class.btn-primary]="unreadOnly" [class.btn-outline-primary]="!unreadOnly" (click)="load(true)">Unread</button>
    </div>
    <button class="btn btn-sm btn-outline-secondary" type="button" (click)="markAllRead()" [disabled]="!summary.unread">Mark all read</button>
  </div>
</div>

<div class="alert alert-danger" *ngIf="error">{{ error }}</div>

<div class="content-card">
  <div class="list-group list-group-flush">
    <div class="list-group-item px-0" *ngFor="let item of notifications">
      <div class="d-flex justify-content-between gap-3">
        <div>
          <div class="d-flex align-items-center gap-2">
            <span class="fw-semibold">{{ item.subject }}</span>
            <span class="badge bg-primary" *ngIf="!item.read">Unread</span>
          </div>
          <div class="small text-muted">{{ item.type }} | {{ item.createdAt || '-' }}</div>
          <div>{{ body(item) }}</div>
        </div>
        <button class="btn btn-sm btn-outline-primary text-nowrap align-self-start" type="button" (click)="markRead(item)" [disabled]="item.read">Mark read</button>
      </div>
    </div>
    <div class="text-muted" *ngIf="!notifications.length">No notifications found.</div>
  </div>
</div>
