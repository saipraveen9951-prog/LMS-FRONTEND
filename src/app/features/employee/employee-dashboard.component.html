<h2 class="page-title">My Learning</h2>
<div class="alert alert-danger" *ngIf="error">{{ error }}</div>
<div class="alert alert-success" *ngIf="message">{{ message }}</div>

<div class="row g-3">
  <div class="col-lg-4">
    <form class="content-card" [formGroup]="profileForm" (ngSubmit)="saveProfile()">
      <h3 class="h5">Profile</h3>
      <p class="text-muted small">{{ profile?.email }} {{ profile?.role }}</p>
      <input class="form-control mb-2" formControlName="firstName" placeholder="First name">
      <input class="form-control mb-2" formControlName="lastName" placeholder="Last name">
      <input class="form-control mb-3" formControlName="departmentName" placeholder="Department">
      <button class="btn btn-primary w-100" type="submit">Save Profile</button>
    </form>
  </div>

  <div class="col-lg-8">
    <div class="content-card">
      <h3 class="h5">Assigned Courses</h3>
      <div class="table-responsive">
        <table class="table table-sm align-middle">
          <thead><tr><th>Course</th><th>Status</th><th>Progress</th><th>Update</th></tr></thead>
          <tbody>
            <tr *ngFor="let item of enrollments">
              <td>{{ item.courseTitle }}</td>
              <td>{{ item.status }}</td>
              <td>{{ item.completedModules }}/{{ item.totalModules }}</td>
              <td>
                <div class="input-group input-group-sm">
                  <input class="form-control" type="number" min="0" [max]="item.totalModules" [(ngModel)]="progressValues[item.id]" [ngModelOptions]="{ standalone: true }">
                  <button class="btn btn-outline-primary" type="button" (click)="updateProgress(item)">Save</button>
                </div>
              </td>
            </tr>
            <tr *ngIf="!enrollments.length"><td colspan="4" class="text-muted">No assigned courses.</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
